[core]
dags_folder = /opt/airflow/dags
load_examples = False
executor = CeleryExecutor

[database]
sql_alchemy_conn = postgresql+psycopg2://conductor:conductor@postgres:5432/conductor

[celery]
broker_url = redis://redis:6379/0
result_backend = db+postgresql://conductor:conductor@postgres:5432/conductor

[api]
base_url = http://localhost:8080
execution_api_server_url = http://airflow-api-server:8080

[dag_processor]
dag_bundle_config_list =

    {
      "name": "local-dags",
      "classpath": "airflow.dag_processing.bundles.local.LocalDagBundle",
      "kwargs": {
        "path": "/opt/airflow/dags"
      }
    }

    # Future: Git-based bundle for production — uncomment when repo is ready
    # {
    #   "name": "git-dags",
    #   "classpath": "airflow.providers.git.bundles.git.GitDagBundle",
    #   "kwargs": {
    #     "git_conn_id": "conductor_git",
    #     "subdir": "dags",
    #     "tracking_ref": "main"
    #   }
    # }

[webserver]
# Airflow 3.x uses api-server — this section is for RBAC fallback
rbac = True

[scheduler]
dag_dir_list_interval = 30
min_file_process_interval = 30