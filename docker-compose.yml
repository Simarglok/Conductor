# Conductor — Development Docker Compose
# Apple Silicon ready · Airflow 3.3.0 · dbt-core 2.0.0a4

x-airflow-common: &airflow-common
  image: conductor-airflow:latest
  build:
    context: ./docker/airflow
    args:
      AIRFLOW_VERSION: 3.3.0
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://conductor:conductor@postgres:5432/conductor
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://conductor:conductor@postgres:5432/conductor
    AIRFLOW__API__BASE_URL: http://airflow-api-server:8080
    AIRFLOW__API__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    _AIRFLOW_DB_UPGRADE: "false"
    _AIRFLOW_WWW_USER_CREATE: "false"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./docker/airflow/airflow.cfg:/opt/airflow/airflow.cfg:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  restart: unless-stopped

services:

  # ─── Database ───
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: conductor
      POSTGRES_PASSWORD: conductor
      POSTGRES_DB: conductor
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conductor"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ─── Cache / Message Broker ───
  redis:
    image: redis:8.6.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Conductor Backend ───
  fastapi:
    build: ./backend
    image: conductor-backend:latest
    env_file: ./backend/.env
    environment:
      CONDUCTOR_DATABASE_URL: postgresql+asyncpg://conductor:conductor@postgres:5432/conductor
      CONDUCTOR_REDIS_URL: redis://redis:6379/0
      CONDUCTOR_SECRET_KEY: dev-secret-change-in-production
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app  # hot-reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ─── Conductor Frontend (placeholder — TBD) ───
  # react-ui:
  #   build: ./frontend
  #   ports:
  #     - "3000:80"
  #   depends_on: [fastapi]

  # ─── Airflow 3.x — DB Init ───
  airflow-db-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@conductor.local
    profiles:
      - init

  # ─── Airflow 3.x — Scheduler ───
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler

  # ─── Airflow 3.x — Dag Processor ───
  airflow-dag-processor:
    <<: *airflow-common
    command: airflow dag-processor

  # ─── Airflow 3.x — API Server (UI + REST + Task SDK) ───
  airflow-api-server:
    <<: *airflow-common
    command: airflow api-server --apps all
    ports:
      - "8080:8080"

  # ─── Airflow 3.x — Celery Worker ───
  airflow-worker:
    <<: *airflow-common
    command: airflow celery worker

  # ─── code-server (dev sandbox, single-user for now) ───
  code-server:
    build: ./docker/code-server
    image: conductor-code-server:latest
    environment:
      PASSWORD: conductor
      DEFAULT_WORKSPACE: /workspace
    ports:
      - "8443:8080"
    volumes:
      - ./workspaces:/workspace
      - ./dags:/workspace/dags
    restart: unless-stopped

volumes:
  postgres_data:
