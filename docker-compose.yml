# Conductor — Development Docker Compose
# Apple Silicon ready · Airflow 3.3.0 · dbt-core 2.0.0a4
#
# FIRST TIME:  docker compose --profile init up airflow-db-init && docker compose up -d
# SUBSEQUENT:  docker compose up -d
#
# Secrets are read from .env at project root (gitignored).
# See .env.example for all available variables.

# ── Airflow environment variables (separate anchor for merge support) ──
x-airflow-env: &airflow-env
  # Core
  AIRFLOW__CORE__EXECUTOR: CeleryExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags

  # Auth
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  AIRFLOW__API_AUTH__JWT_SECRET: ${CONDUCTOR_JWT_SECRET:-conductor-dev-jwt-secret-change-in-prod}

  # Database — overridden per project
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
    postgresql+psycopg2://${CONDUCTOR_DB_USER:-conductor}:${CONDUCTOR_DB_PASSWORD:-conductor}@${CONDUCTOR_DB_HOST:-postgres}:${CONDUCTOR_DB_PORT:-5432}/${CONDUCTOR_DB_NAME:-conductor}

  # Celery
  AIRFLOW__CELERY__BROKER_URL: >-
    redis://${CONDUCTOR_REDIS_HOST:-redis}:${CONDUCTOR_REDIS_PORT:-6379}/${CONDUCTOR_REDIS_DB:-0}
  AIRFLOW__CELERY__RESULT_BACKEND: >-
      db+postgresql://${CONDUCTOR_DB_USER:-conductor}:${CONDUCTOR_DB_PASSWORD:-conductor}@${CONDUCTOR_DB_HOST:-postgres}:${CONDUCTOR_DB_PORT:-5432}/${CONDUCTOR_DB_NAME:-conductor}

  # API Server
  AIRFLOW__API__BASE_URL: http://localhost:8080
  AIRFLOW__API__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080

  # Dag Processor
  AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL: "30"
  AIRFLOW__DAG_PROCESSOR__DAG_BUNDLE_CONFIG_LIST: >-
    [{"name":"local-dags","classpath":"airflow.dag_processing.bundles.local.LocalDagBundle","kwargs":{"path":"/opt/airflow/dags"}}]

  # _AIRFLOW_WWW_USER_PASSWORD removed — unused in Airflow 3.x
  # Admin user created via `airflow users create` in airflow-db-init

# ── Airflow common service config ──
x-airflow-common: &airflow-common
  build:
    context: ./docker/airflow
    args:
      AIRFLOW_VERSION: 3.3.0
  environment:
    <<: *airflow-env
    _AIRFLOW_DB_MIGRATE: "false"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  restart: unless-stopped

# ── Per-project Airflow environment overrides ──
x-airflow-dw: &airflow-dw
  <<: *airflow-env
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
    postgresql+psycopg2://${CONDUCTOR_DB_USER:-conductor}:${CONDUCTOR_DB_PASSWORD:-conductor}@${CONDUCTOR_DB_HOST:-postgres}:${CONDUCTOR_DB_PORT:-5432}/airflow_dw
  AIRFLOW__CELERY__BROKER_URL: >-
    redis://${CONDUCTOR_REDIS_HOST:-redis}:${CONDUCTOR_REDIS_PORT:-6379}/3
  AIRFLOW__CELERY__RESULT_BACKEND: >-
    db+postgresql://${CONDUCTOR_DB_USER:-conductor}:${CONDUCTOR_DB_PASSWORD:-conductor}@${CONDUCTOR_DB_HOST:-postgres}:${CONDUCTOR_DB_PORT:-5432}/airflow_dw
  AIRFLOW__API__BASE_URL: http://localhost:8081
  AIRFLOW__API__EXECUTION_API_SERVER_URL: http://airflow-dw-api-server:8080
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW__DAG_PROCESSOR__DAG_BUNDLE_CONFIG_LIST: >-
    [{"name":"local-dags","classpath":"airflow.dag_processing.bundles.local.LocalDagBundle","kwargs":{"path":"/opt/airflow/dags"}}]

x-airflow-mktg: &airflow-mktg
  <<: *airflow-env
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
    postgresql+psycopg2://${CONDUCTOR_DB_USER:-conductor}:${CONDUCTOR_DB_PASSWORD:-conductor}@${CONDUCTOR_DB_HOST:-postgres}:${CONDUCTOR_DB_PORT:-5432}/airflow_mktg
  AIRFLOW__CELERY__BROKER_URL: >-
    redis://${CONDUCTOR_REDIS_HOST:-redis}:${CONDUCTOR_REDIS_PORT:-6379}/4
  AIRFLOW__CELERY__RESULT_BACKEND: >-
    db+postgresql://${CONDUCTOR_DB_USER:-conductor}:${CONDUCTOR_DB_PASSWORD:-conductor}@${CONDUCTOR_DB_HOST:-postgres}:${CONDUCTOR_DB_PORT:-5432}/airflow_mktg
  AIRFLOW__API__BASE_URL: http://localhost:8082
  AIRFLOW__API__EXECUTION_API_SERVER_URL: http://airflow-mktg-api-server:8080
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW__DAG_PROCESSOR__DAG_BUNDLE_CONFIG_LIST: >-
    [{"name":"local-dags","classpath":"airflow.dag_processing.bundles.local.LocalDagBundle","kwargs":{"path":"/opt/airflow/dags"}}]

services:

  # ─── Database ───
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${CONDUCTOR_DB_USER:-conductor}
      POSTGRES_PASSWORD: ${CONDUCTOR_DB_PASSWORD:-conductor}
      POSTGRES_DB: ${CONDUCTOR_DB_NAME:-conductor}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CONDUCTOR_DB_USER:-conductor}"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    restart: unless-stopped

  # ─── Cache / Message Broker ───
  redis:
    image: redis:8.6.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Conductor Backend ───
  fastapi:
    build: ./backend
    image: conductor-backend:latest
    env_file: ./backend/.env
    environment:
      CONDUCTOR_DATABASE_URL: >-
        postgresql+asyncpg://${CONDUCTOR_DB_USER:-conductor}:${CONDUCTOR_DB_PASSWORD:-conductor}@${CONDUCTOR_DB_HOST:-postgres}:${CONDUCTOR_DB_PORT:-5432}/${CONDUCTOR_DB_NAME:-conductor}
      CONDUCTOR_REDIS_URL: >-
        redis://${CONDUCTOR_REDIS_HOST:-redis}:${CONDUCTOR_REDIS_PORT:-6379}/1
      CONDUCTOR_SECRET_KEY: ${CONDUCTOR_JWT_SECRET:-conductor-dev-jwt-secret-change-in-prod}
      CONDUCTOR_CODE_SERVER_HOST: http://code-server:8080
      CONDUCTOR_CODE_SERVER_JWT_SECRET: ${CONDUCTOR_CODE_SERVER_JWT_SECRET:-conductor-cs-jwt-secret}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app  # hot-reload
      - ./backend/tests:/app/tests  # test files
      - ./backend/pyproject.toml:/app/pyproject.toml  # for pytest config
      - ./workspaces:/workspace  # shared with code-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status == 200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Conductor Frontend (placeholder — TBD) ───
  # react-ui:
  #   build: ./frontend
  #   ports:
  #     - "3000:80"
  #   depends_on: [fastapi]

  # ─── Airflow 3.x — DB Init (run once with --profile init) ───
  airflow-db-init:
    <<: *airflow-common
    restart: "no"
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: "true"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password ${CONDUCTOR_AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@conductor.local
    profiles:
      - init

  # ─── Airflow 3.x — Scheduler ───
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler

  # ─── Airflow 3.x — Dag Processor ───
  airflow-dag-processor:
    <<: *airflow-common
    command: airflow dag-processor

  # ─── Airflow 3.x — API Server (UI + REST + Task SDK) ───
  airflow-api-server:
    <<: *airflow-common
    command: airflow api-server --apps all
    ports:
      - "8080:8080"

  # ─── Airflow 3.x — Celery Worker ───
  airflow-worker:
    <<: *airflow-common
    command: airflow celery worker

  # ─── Data Warehouse Airflow ───

  airflow-dw-db-init:
    <<: *airflow-common
    restart: "no"
    environment:
      <<: *airflow-dw
      _AIRFLOW_DB_MIGRATE: "true"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password ${CONDUCTOR_AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@conductor.local &&
        python3 /home/airflow/create_airflow_users.py data-warehouse
    volumes:
      - ./dags/data-warehouse:/opt/airflow/dags
      - ./logs/data-warehouse:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    profiles:
      - init

  airflow-dw-scheduler:
    <<: *airflow-common
    environment: *airflow-dw
    command: airflow scheduler
    volumes:
      - ./dags/data-warehouse:/opt/airflow/dags
      - ./logs/data-warehouse:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  airflow-dw-dag-processor:
    <<: *airflow-common
    environment: *airflow-dw
    command: airflow dag-processor
    volumes:
      - ./dags/data-warehouse:/opt/airflow/dags
      - ./logs/data-warehouse:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  airflow-dw-api-server:
    <<: *airflow-common
    environment: *airflow-dw
    command: airflow api-server --apps all
    ports:
      - "8081:8080"
    volumes:
      - ./dags/data-warehouse:/opt/airflow/dags
      - ./logs/data-warehouse:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  airflow-dw-worker:
    <<: *airflow-common
    environment: *airflow-dw
    command: airflow celery worker
    volumes:
      - ./dags/data-warehouse:/opt/airflow/dags
      - ./logs/data-warehouse:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  # ─── Marketing Airflow ───

  airflow-mktg-db-init:
    <<: *airflow-common
    restart: "no"
    environment:
      <<: *airflow-mktg
      _AIRFLOW_DB_MIGRATE: "true"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password ${CONDUCTOR_AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@conductor.local &&
        python3 /home/airflow/create_airflow_users.py marketing
    volumes:
      - ./dags/marketing:/opt/airflow/dags
      - ./logs/marketing:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    profiles:
      - init

  airflow-mktg-scheduler:
    <<: *airflow-common
    environment: *airflow-mktg
    command: airflow scheduler
    volumes:
      - ./dags/marketing:/opt/airflow/dags
      - ./logs/marketing:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  airflow-mktg-dag-processor:
    <<: *airflow-common
    environment: *airflow-mktg
    command: airflow dag-processor
    volumes:
      - ./dags/marketing:/opt/airflow/dags
      - ./logs/marketing:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  airflow-mktg-api-server:
    <<: *airflow-common
    environment: *airflow-mktg
    command: airflow api-server --apps all
    ports:
      - "8082:8080"
    volumes:
      - ./dags/marketing:/opt/airflow/dags
      - ./logs/marketing:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  airflow-mktg-worker:
    <<: *airflow-common
    environment: *airflow-mktg
    command: airflow celery worker
    volumes:
      - ./dags/marketing:/opt/airflow/dags
      - ./logs/marketing:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins

  # ─── code-server (multiuser, JWT auth) ───
  code-server:
    build: ./docker/code-server
    image: conductor-code-server:latest
    environment:
      CODE_SERVER_AUTH: jwt
      CODE_SERVER_JWT_SECRET: ${CONDUCTOR_CODE_SERVER_JWT_SECRET:-conductor-cs-jwt-secret}
      PASSWORD: ""
      DEFAULT_WORKSPACE: /workspace
    ports:
      - "8443:8080"
    volumes:
      - ./workspaces:/workspace
      - ./dags:/workspace/dags:ro
    restart: unless-stopped

  # ─── Frontend (React SPA) ───
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - fastapi
    restart: unless-stopped

volumes:
  postgres_data: